name: CI

on:
  push:
    branches: ["main", "feature/**", "phase/**"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          cd melodious-v2
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test
        run: |
          cd melodious-v2
          PYTHONPATH=src python -m unittest discover tests
      - name: Validate metric claims
        run: |
          cd melodious-v2
          PYTHONPATH=src python scripts/validate_metric_claims.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        run: |
          cd melodious-v2/frontend
          npm install
          npm run build

