run_family: detection_15class_repro
taxonomy_id: deepscores_15_reduced
data:
  dataset_id: legacy_deepscores_15class_sample
  split: sample_quick
  predictions_dir: ../sample_detections/model_outputs_quick
  train_json: ../dataset_ds2_dense/deepscores_train.json
  test_json: ../dataset_ds2_dense/deepscores_test.json
  checkpoint: ../outputs/yolov8_runs/train/weights/best.pt
semantic_subset:
  - noteheadBlackOnLine
  - noteheadBlackInSpace
  - noteheadHalfOnLine
  - noteheadHalfInSpace
  - noteheadWholeOnLine
  - noteheadWholeInSpace
  - clefG
  - clefF
  - clefCAlto
  - clefCTenor
  - rest8th
  - restQuarter
  - restHalf
  - restWhole
  - accidentalSharp
  - accidentalFlat
  - accidentalNatural
  - beam
  - stem
model:
  family: yolov8s
  pretrained: true
  image_size: 640
training:
  epochs: 100
  batch_size: 8
  seed: 42
metrics:
  primary: mAP@0.5:0.95
  secondary:
    - mAP@0.5
    - precision@0.5
    - recall@0.5
    - F1@0.5
outputs:
  run_dir: runs/detection/detection_15class_repro_sample_v1
notes:
  - Evaluate legacy sample predictions through V2 metrics without training a model.
  - Reduce DeepScores full-class annotations into the legacy 15-class taxonomy before scoring.
