run_family: detection_136class_yolov8m
taxonomy_id: deepscores_136
data:
  dataset_config: runs/data/deepscores_136_manifest/yolo_dataset.yaml
  manifest_dir: runs/data/deepscores_136_manifest
  materialized_dataset_config: runs/data/deepscores_136_yolo_materialized/dataset.yaml
  materialized_dataset_dir: runs/data/deepscores_136_yolo_materialized
model:
  family: yolov8m
  pretrained: true
  pretrained_source: yolov8m.pt
  image_size: 1024
  tiled_inference: true
  tile_size: 1024
  tile_overlap: 0.2
training:
  epochs: 150
  batch_size: 4
  seed: 42
  class_balanced_sampling: true
  patience: 30
metrics:
  primary: mAP@0.5:0.95
  threshold_selection_split: validation
outputs:
  run_dir_template: runs/detection/{run_id}
