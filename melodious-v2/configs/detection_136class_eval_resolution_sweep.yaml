    batch_size: 1
    val_augment: true
    result: regressed_primary_metric
notes:
  - This sweep does not train a new model.
  - It measures the existing best YOLOv8m checkpoint under validation-only inference-resolution settings.
  - The selected 1248 setting improves validation mAP@0.5:0.95 but still leaves high-support classes such as ledgerLine and stem at zero mAP.
